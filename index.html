<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Countdown" />
  <meta name="theme-color" content="#080810" />
  <title>Countdown Wall · AppADay 014</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #080810;
      --surface:   #0f0f1a;
      --border:    rgba(255,255,255,0.07);
      --text:      #e8e8f0;
      --muted:     rgba(232,232,240,0.45);
      --accent1:   #c8a2f8;   /* lavender */
      --accent2:   #7ec8e3;   /* sky */
      --accent3:   #f4a261;   /* amber */
      --accent4:   #52d9a0;   /* mint */
      --accent5:   #f07ca0;   /* rose */
      --radius:    18px;
      --mono:      'DM Mono', monospace;
      --serif:     'DM Serif Display', Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* Starfield */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 73% 8%,  rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 42%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 62% 88%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 95%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 50% 30%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 65%, rgba(255,255,255,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    #app {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 4px 12px;
    }

    .header-title {
      font-family: var(--serif);
      font-size: 1.6rem;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .header-title span {
      color: var(--muted);
      font-style: italic;
      font-size: 1rem;
      margin-left: 6px;
    }

    #add-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 1.4rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      line-height: 1;
    }
    #add-btn:hover { background: rgba(255,255,255,0.13); transform: scale(1.08); }
    #add-btn:active { transform: scale(0.94); }

    /* ── Cards ── */
    #cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
      padding-bottom: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px 20px;
      position: relative;
      overflow: hidden;
      animation: cardIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      transition: transform 0.2s;
    }
    .card:active { transform: scale(0.985); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* Glow stripe on left edge */
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
      background: var(--card-accent, var(--accent1));
    }

    /* Faint radial glow from top-left */
    .card::after {
      content: '';
      position: absolute;
      top: -40px; left: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--card-glow, rgba(200,162,248,0.08)) 0%, transparent 70%);
      pointer-events: none;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .card-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--card-accent, var(--accent1));
    }

    .card-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      opacity: 0.4;
      transition: opacity 0.2s;
      padding: 0 0 0 8px;
      line-height: 1;
    }
    .card-delete:hover { opacity: 1; }

    .card-name {
      font-family: var(--serif);
      font-size: 1.35rem;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 6px;
      color: var(--text);
    }

    .card-date-display {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 18px;
    }

    /* ── Big number display ── */
    .countdown-display {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .countdown-number {
      font-family: var(--serif);
      font-size: clamp(3.5rem, 14vw, 5rem);
      line-height: 1;
      color: var(--text);
      letter-spacing: -0.03em;
      font-style: italic;
    }

    .countdown-unit {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-today {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-style: italic;
      color: var(--card-accent, var(--accent1));
    }

    .card-past {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 16px;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--card-accent, var(--accent1));
      border-radius: 2px;
      opacity: 0.6;
      transition: width 0.6s ease;
    }

    /* ── Empty State ── */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      padding: 40px 20px;
      opacity: 0.5;
    }
    #empty .empty-icon { font-size: 3rem; }
    #empty p {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--muted);
    }
    #empty small {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
      padding: 0 0 env(safe-area-inset-bottom, 0);
    }
    #modal-overlay.open {
      display: flex;
      animation: overlayIn 0.2s ease both;
    }
    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #modal {
      background: #13131f;
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom: none;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 560px;
      padding: 28px 24px 36px;
      animation: sheetIn 0.3s cubic-bezier(0.34, 1.3, 0.64, 1) both;
    }
    @keyframes sheetIn {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    .modal-title {
      font-family: var(--serif);
      font-size: 1.4rem;
      margin-bottom: 22px;
      color: var(--text);
    }

    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 1rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus {
      border-color: rgba(200,162,248,0.5);
    }
    .field input::placeholder { color: rgba(255,255,255,0.2); }

    /* Color picker */
    .color-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }
    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: white; transform: scale(1.1); }

    #modal-save {
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      background: var(--accent1);
      color: #0a0010;
      border: none;
      border-radius: 14px;
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    #modal-save:hover { opacity: 0.9; }
    #modal-save:active { transform: scale(0.98); }

    #modal-cancel {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.04em;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.15);
      padding: 10px 0 4px;
      text-transform: uppercase;
    }
    footer a {
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-title">Countdown Wall<span>014</span></div>
    <button id="add-btn" aria-label="Add countdown">+</button>
  </header>

  <div id="cards"></div>
  <div id="empty" style="display:none">
    <div class="empty-icon">⏳</div>
    <p>Nothing to count down to… yet.</p>
    <small>Tap + to add your first event</small>
  </div>

  <footer><a href="https://augustineiacopelli.github.io">AppADay · augustineiacopelli.github.io</a></footer>
</div>

<!-- Add Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">New Countdown</div>
    <div class="field">
      <label>Event Name</label>
      <input type="text" id="input-name" placeholder="e.g. Rome Trip" maxlength="40" />
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="input-date" />
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-row" id="color-row"></div>
    </div>
    <button id="modal-save">Add Countdown</button>
    <button id="modal-cancel">Cancel</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'appaday-014-countdowns';
  const ACCENTS = [
    { name: 'lavender', color: '#c8a2f8', glow: 'rgba(200,162,248,0.1)' },
    { name: 'sky',      color: '#7ec8e3', glow: 'rgba(126,200,227,0.1)' },
    { name: 'amber',    color: '#f4a261', glow: 'rgba(244,162,97,0.1)'  },
    { name: 'mint',     color: '#52d9a0', glow: 'rgba(82,217,160,0.1)'  },
    { name: 'rose',     color: '#f07ca0', glow: 'rgba(240,124,160,0.1)' },
    { name: 'gold',     color: '#f5d76e', glow: 'rgba(245,215,110,0.1)' },
    { name: 'coral',    color: '#ff6b6b', glow: 'rgba(255,107,107,0.1)' },
    { name: 'indigo',   color: '#818cf8', glow: 'rgba(129,140,248,0.1)' },
    { name: 'teal',     color: '#2dd4bf', glow: 'rgba(45,212,191,0.1)'  },
    { name: 'peach',    color: '#ffb347', glow: 'rgba(255,179,71,0.1)'  },
    { name: 'lime',     color: '#a3e635', glow: 'rgba(163,230,53,0.1)'  },
    { name: 'ice',      color: '#bae6fd', glow: 'rgba(186,230,253,0.1)' },
  ];

  let countdowns = [];
  let selectedColor = 0;

  // ── Storage ──
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      countdowns = raw ? JSON.parse(raw) : [];
    } catch { countdowns = []; }
  }
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(countdowns));
  }

  // ── Date math ──
  function daysUntil(dateStr) {
    const now = new Date();
    const target = new Date(dateStr + 'T00:00:00');
    const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const targetMidnight = new Date(target.getFullYear(), target.getMonth(), target.getDate());
    return Math.round((targetMidnight - todayMidnight) / 86400000);
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  // ── Render ──
  function render() {
    const container = document.getElementById('cards');
    const empty = document.getElementById('empty');
    container.innerHTML = '';

    if (countdowns.length === 0) {
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';

    // Sort: soonest first, then past events
    const sorted = [...countdowns].sort((a, b) => {
      const da = daysUntil(a.date);
      const db = daysUntil(b.date);
      if (da >= 0 && db >= 0) return da - db;
      if (da < 0 && db < 0) return db - da;
      return da >= 0 ? -1 : 1;
    });

    sorted.forEach(item => {
      const days = daysUntil(item.date);
      const accent = ACCENTS[item.colorIdx] || ACCENTS[0];
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--card-accent', accent.color);
      card.style.setProperty('--card-glow', accent.glow);

      let mainContent;
      if (days === 0) {
        mainContent = `<div class="card-today">Today! 🎉</div>`;
      } else if (days < 0) {
        mainContent = `
          <div class="countdown-display">
            <span class="countdown-number">${Math.abs(days)}</span>
            <span class="countdown-unit">day${Math.abs(days) !== 1 ? 's' : ''} ago</span>
          </div>`;
      } else {
        // Progress: estimate based on 1 year window
        const totalDays = 365;
        const pct = Math.max(0, Math.min(100, ((totalDays - days) / totalDays) * 100));
        mainContent = `
          <div class="countdown-display">
            <span class="countdown-number">${days}</span>
            <span class="countdown-unit">day${days !== 1 ? 's' : ''} away</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>`;
      }

      card.innerHTML = `
        <div class="card-header">
          <span class="card-label">${days === 0 ? '🎉 Today' : days < 0 ? 'Past' : 'Upcoming'}</span>
          <button class="card-delete" data-id="${item.id}" aria-label="Delete">✕</button>
        </div>
        <div class="card-name">${escHtml(item.name)}</div>
        <div class="card-date-display">${formatDate(item.date)}</div>
        ${mainContent}
      `;
      container.appendChild(card);
    });

    document.querySelectorAll('.card-delete').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = btn.dataset.id;
        countdowns = countdowns.filter(c => c.id !== id);
        save();
        render();
      });
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Modal ──
  function buildColorPicker() {
    const row = document.getElementById('color-row');
    row.innerHTML = '';
    ACCENTS.forEach((a, i) => {
      const sw = document.createElement('button');
      sw.className = 'color-swatch' + (i === selectedColor ? ' selected' : '');
      sw.style.background = a.color;
      sw.setAttribute('aria-label', a.name);
      sw.addEventListener('click', () => {
        selectedColor = i;
        document.querySelectorAll('.color-swatch').forEach((s, j) => {
          s.classList.toggle('selected', j === i);
        });
        document.getElementById('modal-save').style.background = a.color;
      });
      row.appendChild(sw);
    });
  }

  function openModal() {
    selectedColor = countdowns.length % ACCENTS.length;
    buildColorPicker();
    document.getElementById('modal-save').style.background = ACCENTS[selectedColor].color;
    document.getElementById('input-name').value = '';
    // Default date: tomorrow
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById('input-date').value = tomorrow.toISOString().split('T')[0];
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('input-name').focus(), 350);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  document.getElementById('add-btn').addEventListener('click', openModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  document.getElementById('modal-save').addEventListener('click', () => {
    const name = document.getElementById('input-name').value.trim();
    const date = document.getElementById('input-date').value;
    if (!name || !date) {
      document.getElementById(name ? 'input-date' : 'input-name').focus();
      return;
    }
    countdowns.push({ id: Date.now().toString(), name, date, colorIdx: selectedColor });
    save();
    closeModal();
    render();
  });

  // Enter key in name field moves to date
  document.getElementById('input-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('input-date').focus();
  });

  // ── Refresh every minute ──
  function tick() {
    render();
    const now = new Date();
    const msUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
    setTimeout(tick, msUntilNextMinute);
  }

  // ── Seed with a sample countdown if empty on first load ──
  load();
  if (countdowns.length === 0) {
    // Add one sample so the app doesn't feel dead on first open
    const sample = new Date();
    sample.setDate(sample.getDate() + 30);
    countdowns.push({
      id: 'sample',
      name: 'One Month from Now',
      date: sample.toISOString().split('T')[0],
      colorIdx: 0
    });
    save();
  }
  tick();
</script>
</body>
</html>
